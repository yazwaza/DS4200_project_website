<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Risk Factor Radar Chart</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px;
      background: #fff;
    }

    h2 {
      font-size: 18px;
      margin-bottom: 4px;
      text-align: center;
    }

    .subtitle {
      font-size: 12px;
      color: #6B7280;
      margin-bottom: 20px;
      text-align: center;
    }

    .tooltip {
      position: absolute;
      background: #1f2937;
      color: #f9fafb;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      line-height: 1.6;
    }

    .legend {
      display: flex;
      gap: 24px;
      margin-top: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
    }

    .legend-box {
      width: 14px;
      height: 14px;
      border-radius: 3px;
    }

    .dot {
      cursor: pointer;
    }

    .dot:hover {
      r: 6;
    }
  </style>
</head>
<body>

<h2>Patient Profile Comparison: Disease vs. No Disease</h2>

<div class="subtitle">This chart compares symptom and indicator prevalence between disease-positive and disease-negative groups.</div>

<div class="tooltip" id="tooltip"></div>

<script>
  const factors = [
    'Smoking', 'Disease Family History', 'Throat Discomfort',
    'Breathing Issue', 'Chest Tightness', 'Stress/Immune',
    'Pollution Exposure', 'Immune Weakness', 'Alcohol Use'
  ];

  const diseaseVals    = [0.9288, 0.3510, 0.8552, 0.9308, 0.6161, 0.2985, 0.5734, 0.4683, 0.3544];
  const noDiseaseVals  = [0.4860, 0.1029, 0.5903, 0.7108, 0.5899, 0.1485, 0.4765, 0.3442, 0.3540];

  const n = factors.length;

  // ── Dimensions
  const width  = 560;
const height = 520;
  const cx = width / 2;
  const cy = height / 2;
  const radius = 180;
  const levels = 5; // different levels for the rings

  const svg = d3.select("body")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

  // ── Angle for each axis
  const angleSlice = (2 * Math.PI) / n;

  // ── Scale: 0 to 1 mapped to 0 to radius
  const rScale = d3.scaleLinear()
    .domain([0, 1])
    .range([0, radius]);

  // ── Draw concentric rings
  for (let lvl = 1; lvl <= levels; lvl++) {
    const r = (radius / levels) * lvl;
    const ringPoints = factors.map((_, i) => {
      const angle = angleSlice * i - Math.PI / 2;
      return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
    });

    svg.append("polygon")
      .attr("points", ringPoints.map(p => p.join(",")).join(" "))
      .attr("fill", "none")
      .attr("stroke", "#e5e7eb")
      .attr("stroke-width", 1);

    // Ring labels (%)
    svg.append("text")
      .attr("x", cx + 4)
      .attr("y", cy - r + 4)
      .style("font-size", "9px")
      .style("fill", "#9ca3af")
      .text((lvl * 20) + "%");
  }

  // ── Draw axis lines and labels
  factors.forEach((factor, i) => {
    const angle = angleSlice * i - Math.PI / 2;
    const x2 = cx + radius * Math.cos(angle);
    const y2 = cy + radius * Math.sin(angle);

    // Axis line
    svg.append("line")
      .attr("x1", cx).attr("y1", cy)
      .attr("x2", x2).attr("y2", y2)
      .attr("stroke", "#d1d5db")
      .attr("stroke-width", 1);

    // Labels
    const labelR = radius + 34;
const lx = cx + labelR * Math.cos(angle);
const ly = cy + labelR * Math.sin(angle);

    svg.append("text")
      .attr("x", lx)
      .attr("y", ly)
      .attr("text-anchor", "middle")
      .attr("dominant-baseline", "central")
      .style("font-size", "11px")
      .style("font-weight", "600")
      .style("fill", "#374151")
      .text(factor);
  });

  function getPoints(vals) {
    return vals.map((v, i) => {
      const angle = angleSlice * i - Math.PI / 2;
      const r = rScale(v);
      return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
    });
  }

  const tooltip = d3.select("#tooltip");

  // draw the polygon
  function drawGroup(vals, color, label) {
    const points = getPoints(vals);

    // Filled polygon
    svg.append("polygon")
      .attr("points", points.map(p => p.join(",")).join(" "))
      .attr("fill", color)
      .attr("fill-opacity", 0.2)
      .attr("stroke", color)
      .attr("stroke-width", 2);

    // Dots on each axis
    points.forEach((p, i) => {
      svg.append("circle")
        .attr("class", "dot")
        .attr("cx", p[0])
        .attr("cy", p[1])
        .attr("r", 4)
        .attr("fill", color)
        .attr("stroke", "#fff")
        .attr("stroke-width", 1.5)
        .on("mouseover", function(event) {
          tooltip
            .style("opacity", 1)
            .html(`<strong>${factors[i]}</strong><br>
                   Group: ${label}<br>
                   Prevalence: ${(vals[i] * 100).toFixed(1)}%`);
        })
        .on("mousemove", function(event) {
          tooltip
            .style("left", (event.pageX + 14) + "px")
            .style("top",  (event.pageY - 10) + "px");
        })
        .on("mouseout", function() {
          tooltip.style("opacity", 0);
        });
    });
  }

  // Draw both groups
  drawGroup(noDiseaseVals, "#93C5FD", "No Disease");
  drawGroup(diseaseVals,   "#DC2626", "Pulmonary Disease");

</script>

<div class="legend">
  <div class="legend-item">
    <div class="legend-box" style="background:#DC2626"></div>
    Pulmonary Disease
  </div>
  <div class="legend-item">
    <div class="legend-box" style="background:#93C5FD"></div>
    No Disease
  </div>
</div>

</body>
</html>
