<!DOCTYPE html>
<html>
  <head>
    <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px;
      color: #111827;
      line-height: 1.7;
    }
 
    h1 {
      font-size: 2rem;
      margin-bottom: 4px;
    }
 
    h2 {
      font-size: 1.3rem;
      margin-top: 36px;
      margin-bottom: 8px;
      color: #1e3a8a;
    }
 
    h3 {
      font-size: 1.05rem;
      margin-top: 20px;
      margin-bottom: 4px;
      color: #374151;
    }
 
    p {
      margin-bottom: 12px;
      color: #374151;
    }
 
    nav {
      margin-bottom: 32px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
 
    nav a {
      margin-right: 24px;
      text-decoration: none;
      color: #2563EB;
      font-weight: bold;
    }
 
    nav a:hover {
      text-decoration: underline;
    }
 
    .ref {
      font-size: 0.9rem;
      color: #6B7280;
      margin-bottom: 10px;
    }
 
    .ref a {
      color: #2563EB;
    }
  </style>
  </head>
</html>
